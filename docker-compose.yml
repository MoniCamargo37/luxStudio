services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8750:8750"
    volumes:
      - ./backend/ldt:/app/ldt
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:8750
